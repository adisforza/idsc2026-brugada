# Base configuration - all experiments inherit from this
experiment_name: "baseline"
seed: 42

# Data
data:
  data_path: "experiments/physionet.org/files/brugada-huca/1.0.0"
  sample_rate: 500
  duration: 10  # seconds
  leads: 12

  # Data splits
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  shuffle: true     # For training loader only

  # Data augmentation
  augmentation:
    enabled: false
    noise_std: 0.01
    time_shift: 0.1

  batch_size: 16

# Model architecture
model:
  type: "hybrid_model"  # Options: resnet_baseline, spatial_gcn, hybrid_model
  params:
    dropout: 0.3
    num_resnet_blocks: 3
    hidden_channels: [32, 64, 128]
    kernel_size: 7

# Multi-task setup
tasks:
  brugada:
    weight: 1.0
    enabled: true
  basal_pattern:
    weight: 0.3
    enabled: false
  sudden_death:
    weight: 0.3
    enabled: false

# Training
training:
  epochs: 150
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 0.0001

  # Scheduler
  scheduler: "cosine"
  warmup_epochs: 10
  min_lr: 1e-6

  # Early stopping
  early_stopping_patience: 15
  early_stopping_metric: "val_f2"
  early_stopping_mode: "max"

  # Training optimization
  use_mixing_precision: false
  gradient_clip_norm: 1.0


  # Checkpointing
  save_best_only: true
  checkpoint_dir: "experiments"

  # Logging
  log_interval: 50
  save_plots: true
  verbose: true

evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "f2", "auc"]
  primary_metric: "f2"

# Hardware
device: "auto" # Options: "cpu", "cuda", "auto"
num_workers: -1