_base_: base.yml

experiment_name: "temporal_gnn"

model:
  type: "temporal_gnn"
  params:
    hidden_dim: 64
    num_gnn_layers: 3
    gnn_type: "gcn"       # Options: gcn, gat, gin
    pooling: "mean"       # Options: mean, max, attention
    gnn_kwargs: {}        # Additional arguments for GNN layers

training:
  learning_rate: 0.0005
  weight_decay: 0.01
  epochs: 150